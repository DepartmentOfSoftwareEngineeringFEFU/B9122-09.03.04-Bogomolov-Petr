{% extends 'base.html' %}
{% block title %}Добавить дисциплину — {{ cls.name }}{% endblock %}
{% block content %}
<h1>Добавить дисциплину в учебный план</h1>
<div class="subtitle">{{ cls.name }}</div>
<form method="post" class="form">
    {% csrf_token %}
    <div class="form-group">
        <label for="subject">Дисциплина</label>
        <select name="subject" id="subject" required>
            <option value="">— Выберите дисциплину —</option>
            {% for s in subjects %}
            <option value="{{ s.id }}">{{ s.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label for="hours_per_week">Часов в неделю</label>
        <input type="number" name="hours_per_week" id="hours_per_week" value="2" min="1" max="10" required>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{% url 'curriculum_list' class_pk=cls.pk %}" class="btn btn-outline">Отмена</a>
    </div>
</form>
{% endblock %}
